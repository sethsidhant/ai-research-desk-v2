name: Daily Kite Token Refresh

on:
  workflow_dispatch:          # triggered via cron-job.org or manually from GitHub UI

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          KITE_API_KEY=${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET=${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN=${{ secrets.KITE_ACCESS_TOKEN }}
          KITE_USER_ID=${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD=${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET=${{ secrets.KITE_TOTP_SECRET }}
          EOF

      - name: Refresh Kite token
        run: node refreshKiteToken.js
        working-directory: agents
