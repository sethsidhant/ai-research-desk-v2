name: Evening Digest

on:
  workflow_dispatch:   # triggered via cron-job.org daily at 7:00 PM IST (1:30 PM UTC)

jobs:
  # ── NSE holiday guard ────────────────────────────────────────────────────
  check-holiday:
    runs-on: ubuntu-latest
    outputs:
      is_holiday: ${{ steps.check.outputs.is_holiday }}
    steps:
      - id: check
        name: Check NSE holiday
        run: |
          DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          echo "Today (IST): $DATE"

          NSE_HOLIDAYS="
            2025-01-26
            2025-02-26
            2025-03-14
            2025-04-14
            2025-04-18
            2025-05-01
            2025-08-15
            2025-08-27
            2025-10-02
            2025-10-20
            2025-10-21
            2025-11-05
            2025-12-25
            2026-01-15
            2026-01-26
            2026-03-03
            2026-03-26
            2026-03-31
            2026-04-03
            2026-04-14
            2026-05-01
            2026-05-28
            2026-06-26
            2026-09-14
            2026-10-02
            2026-10-20
            2026-11-10
            2026-11-24
            2026-12-25
          "

          if echo "$NSE_HOLIDAYS" | grep -qw "$DATE"; then
            echo "🏖 NSE Holiday ($DATE) — digest skipped"
            echo "is_holiday=true" >> $GITHUB_OUTPUT
          else
            echo "✓ Market day ($DATE) — proceeding"
            echo "is_holiday=false" >> $GITHUB_OUTPUT
          fi

  # ── Evening digest (skipped on holidays) ─────────────────────────────────
  digest:
    needs: check-holiday
    if: needs.check-holiday.outputs.is_holiday != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          SCREENER_EMAIL=${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD=${{ secrets.SCREENER_PASSWORD }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
          EOF

      - name: Fetch FII/DII data
        run: node fiiAgent.js
        working-directory: agents

      - name: Send evening digest
        run: node telegramNotifier.js
        working-directory: agents

      - name: Write heartbeat
        run: |
          curl -s -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\":\"cron_digest_last_run\",\"value\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}\",\"text\":\"❌ Evening Digest failed\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"parse_mode\":\"Markdown\"}"
