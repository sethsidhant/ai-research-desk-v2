name: Daily Pipeline

on:
  workflow_dispatch:            # triggered via cron-job.org or manually from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          KITE_API_KEY=${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET=${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN=${{ secrets.KITE_ACCESS_TOKEN }}
          KITE_USER_ID=${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD=${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET=${{ secrets.KITE_TOTP_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          EOF

      - name: Backfill EOD closes (Kite historical)
        run: node backfillHistory.js
        working-directory: agents

      - name: Run engine (scores + prices)
        run: node engine.js
        working-directory: agents

      - name: Run news agent
        run: node newsAgent.js
        working-directory: agents

      - name: Run summary agent
        run: node summaryAgent.js
        working-directory: agents

      - name: Run notifier
        run: node whatsappNotifier.js
        working-directory: agents

      - name: Write heartbeat
        run: |
          curl -s -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\":\"cron_pipeline_last_run\",\"value\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}\",\"text\":\"❌ *AI Research Desk — Daily Pipeline Failed*\n\nCheck GitHub Actions for details.\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"parse_mode\":\"Markdown\"}"
