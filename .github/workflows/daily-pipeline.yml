name: Daily Pipeline

on:
  workflow_dispatch:            # triggered via cron-job.org or manually from GitHub UI

jobs:
  # ── NSE holiday guard ────────────────────────────────────────────────────
  check-holiday:
    runs-on: ubuntu-latest
    outputs:
      is_holiday: ${{ steps.check.outputs.is_holiday }}
    steps:
      - id: check
        name: Check NSE holiday
        run: |
          DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          echo "Today (IST): $DATE"

          # NSE equity market holidays — update each January
          # Source: nseindia.com/global/content/market_timings_holidays
          NSE_HOLIDAYS="
            2025-01-26
            2025-02-26
            2025-03-14
            2025-04-14
            2025-04-18
            2025-05-01
            2025-08-15
            2025-08-27
            2025-10-02
            2025-10-20
            2025-10-21
            2025-11-05
            2025-12-25
            2026-01-15
            2026-01-26
            2026-03-03
            2026-03-26
            2026-03-31
            2026-04-03
            2026-04-14
            2026-05-01
            2026-05-28
            2026-06-26
            2026-09-14
            2026-10-02
            2026-10-20
            2026-11-10
            2026-11-24
            2026-12-25
          "

          if echo "$NSE_HOLIDAYS" | grep -qw "$DATE"; then
            echo "🏖 NSE Holiday ($DATE) — pipeline skipped"
            echo "is_holiday=true" >> $GITHUB_OUTPUT
          else
            echo "✓ Market day ($DATE) — proceeding"
            echo "is_holiday=false" >> $GITHUB_OUTPUT
          fi

  # ── Main pipeline (skipped on holidays) ─────────────────────────────────
  pipeline:
    needs: check-holiday
    if: needs.check-holiday.outputs.is_holiday != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          KITE_API_KEY=${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET=${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN=${{ secrets.KITE_ACCESS_TOKEN }}
          KITE_USER_ID=${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD=${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET=${{ secrets.KITE_TOTP_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          SCREENER_EMAIL=${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD=${{ secrets.SCREENER_PASSWORD }}
          EOF

      - name: Fetch fresh Kite token from Supabase
        run: |
          RESPONSE=$(curl -s "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings?key=eq.kite_access_token&select=value" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          TOKEN=$(echo "$RESPONSE" | jq -r '.[0].value' 2>/dev/null || echo "")
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "⚠ Could not fetch token from Supabase — falling back to secret"
            echo "⚠ Raw response: ${RESPONSE:0:200}"
          else
            echo "$TOKEN" > .kite_token
            echo "✓ Fresh token written to .kite_token (${TOKEN:0:8}...)"
          fi

      - name: Backfill EOD closes (Kite historical)
        run: node backfillHistory.js
        working-directory: agents

      - name: Run engine (scores + prices)
        run: node engine.js
        working-directory: agents

      - name: Refresh FII data (Screener final + NSE)
        run: node fiiAgent.js
        working-directory: agents

      - name: Run news agent
        run: node newsAgent.js
        working-directory: agents

      - name: Run MF SEBI agent
        run: node mfSebiAgent.js
        working-directory: agents

      - name: Write heartbeat
        run: |
          curl -s -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\":\"cron_pipeline_last_run\",\"value\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}\",\"text\":\"❌ *AI Research Desk — Daily Pipeline Failed*\n\nCheck GitHub Actions for details.\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"parse_mode\":\"Markdown\"}"
