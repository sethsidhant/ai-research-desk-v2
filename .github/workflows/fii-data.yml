name: FII Data Refresh

on:
  workflow_dispatch:   # triggered via cron-job.org daily at 6:30 PM IST (1:00 PM UTC)

jobs:
  fii:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          SCREENER_EMAIL=${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD=${{ secrets.SCREENER_PASSWORD }}
          EOF

      - name: Run FII agent
        run: node fiiAgent.js
        working-directory: agents

      - name: Write heartbeat
        run: |
          curl -s -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\":\"cron_fii_last_run\",\"value\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}\",\"text\":\"❌ FII Data Refresh failed\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"parse_mode\":\"Markdown\"}"
