name: Run Engine Only

on:
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: npm ci
        working-directory: agents

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          KITE_API_KEY=${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET=${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN=${{ secrets.KITE_ACCESS_TOKEN }}
          KITE_USER_ID=${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD=${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET=${{ secrets.KITE_TOTP_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          EOF

      - name: Fetch fresh Kite token from Supabase
        run: |
          TOKEN=$(curl -s "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_settings?key=eq.kite_access_token&select=value" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" | jq -r '.[0].value')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "⚠ Could not fetch token from Supabase — falling back to secret"
          else
            echo "$TOKEN" > .kite_token
            echo "✓ Fresh token written to .kite_token (${TOKEN:0:8}...)"
          fi

      - name: Run engine (scores + technicals)
        run: node engine.js
        working-directory: agents
